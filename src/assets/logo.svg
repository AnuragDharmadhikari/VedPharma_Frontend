<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Akuner Life Sciences Logo</title>
  <desc>Diamond border containing a smaller filled diamond with cursive a, followed by Akuner Life Sciences text</desc>

  <style>
    .logo-text { font-family: Georgia, serif; font-size: 52px; font-weight: 700; fill: #1a1a1a; letter-spacing: -1px; }
    .logo-sub { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #1a1a1a; letter-spacing: 5px; }
    .logo-a { font-family: Georgia, serif; font-size: 32px; font-style: italic; font-weight: 700; fill: white; }
    @media (prefers-color-scheme: dark) {
      .logo-text { fill: #f0f0f0; }
      .logo-sub { fill: #cccccc; }
      .outer-diamond { stroke: #f0f0f0; }
      .logo-line { stroke: #cccccc; }
    }
  </style>

  <g transform="translate(100, 100) rotate(45)">
    <rect x="-44" y="-44" width="88" height="88" rx="4" fill="none" stroke="#1a1a1a" stroke-width="3.5" class="outer-diamond"/>
  </g>

  <g transform="translate(100, 100) rotate(45)">
    <rect x="-32" y="-32" width="64" height="64" rx="3" fill="#C41E3A"/>
  </g>

  <text x="100" y="108" text-anchor="middle" class="logo-a">a</text>

  <text x="165" y="112" text-anchor="start" class="logo-text">Akuner</text>

  <line x1="165" y1="122" x2="500" y2="122" stroke="#1a1a1a" stroke-width="1.5" opacity="0.35" class="logo-line"/>

  <text x="168" y="148" text-anchor="start" class="logo-sub">LIFE SCIENCES</text>

</svg>